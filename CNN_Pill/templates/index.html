<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân loại thuốc bằng CNN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9em;
            color: #888;
        }

        #fileInput {
            display: none;
        }

        #preview {
            margin-top: 30px;
            display: none;
        }

        #preview img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #results {
            margin-top: 30px;
            display: none;
        }

        .results-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .prediction-item {
            background: #f8f9ff;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .prediction-item:hover {
            background: #f0f2ff;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe6e6;
            color: #d63031;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .model-info {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #555;
        }

        .model-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Phân Loại Thuốc</h1>
        <p class="subtitle">CNN - Deep Learning Model</p>

        <div class="model-info">
            <strong>Model:</strong> EfficientNetV2-S |
            <strong>Classes:</strong> 960 types |
            <strong>Best Val Acc:</strong> 23.46%
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Kéo thả ảnh vào đây hoặc click để chọn</div>
            <div class="upload-hint">Hỗ trợ: PNG, JPG, JPEG, BMP, GIF, TIF, WEBP (tối đa 16MB)</div>
        </div>

        <input type="file" id="fileInput" accept="image/*">

        <div id="preview">
            <img id="previewImage" alt="Preview">
        </div>

        <button class="btn" id="predictBtn" disabled>🔍 Phân Loại</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Đang phân loại...</p>
        </div>

        <div class="error" id="error"></div>

        <div id="results">
            <div class="results-title">📊 Kết Quả Dự Đoán (Top 5)</div>
            <div id="predictionsList"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const predictBtn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const predictionsList = document.getElementById('predictionsList');

        let selectedFile = null;

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // File selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Vui lòng chọn file ảnh hợp lệ');
                return;
            }

            selectedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            predictBtn.disabled = false;
            hideError();
            hideResults();
        }

        // Predict button
        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            hideError();
            hideResults();
            loading.style.display = 'block';
            predictBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Prediction failed');
                }

                displayResults(data);
            } catch (err) {
                showError(err.message);
            } finally {
                loading.style.display = 'none';
                predictBtn.disabled = false;
            }
        });

        function displayResults(data) {
            predictionsList.innerHTML = '';

            data.predictions.forEach((pred, index) => {
                const item = document.createElement('div');
                item.className = 'prediction-item';

                const confidence = parseFloat(pred.confidence);
                const color = getColor(index);

                // Parse NDC code
                const ndcInfo = parseNDCCode(pred.label);
                const lookupUrl = `https://druginfo.nlm.nih.gov/drugportal/search?query=${ndcInfo.baseCode}`;

                item.innerHTML = `
                    <div style="width: 100%;">
                        <div style="display: flex; align-items: center; margin-bottom: 10px;">
                            <div style="width: 40px; font-weight: bold; color: ${color};">#${pred.rank}</div>
                            <div style="flex: 1;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                                    <div>
                                        <div style="font-size: 0.85em; color: #888;">NDC Code:</div>
                                        <div style="font-family: monospace; font-size: 1.1em; color: #333; font-weight: bold;">${ndcInfo.formatted}</div>
                                    </div>
                                    <span style="font-weight: bold; color: ${color}; font-size: 1.2em;">${pred.confidence}</span>
                                </div>
                            </div>
                        </div>
                        <div style="background: #f0f8ff; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9em;">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px;">
                                <div><strong style="color: #667eea;">Labeler:</strong> ${ndcInfo.labeler}</div>
                                <div><strong style="color: #764ba2;">Product:</strong> ${ndcInfo.product}</div>
                                <div><strong style="color: #f093fb;">Package:</strong> ${ndcInfo.package}</div>
                            </div>
                            <a href="${lookupUrl}" target="_blank" style="display: inline-block; padding: 6px 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 5px; font-size: 0.85em;">
                                🔍 Tra cứu trên NIH Drug Database
                            </a>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${confidence}%; background: linear-gradient(90deg, ${color}, ${color}99);"></div>
                        </div>
                    </div>
                `;

                predictionsList.appendChild(item);
            });

            results.style.display = 'block';
        }

        function parseNDCCode(label) {
            // Parse NDC code like "51285-0092-87_BE305F72"
            const parts = label.split('_');
            const ndcCode = parts[0]; // "51285-0092-87"
            const hash = parts[1] || ''; // "BE305F72"

            const segments = ndcCode.split('-');
            const labeler = segments[0] || 'N/A';
            const product = segments[1] || 'N/A';
            const pkg = segments[2] || 'N/A';

            return {
                formatted: ndcCode,
                baseCode: ndcCode.replace(/-/g, ''),
                labeler: labeler,
                product: product,
                package: pkg,
                hash: hash
            };
        }

        function getColor(index) {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'];
            return colors[index % colors.length];
        }

        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
        }

        function hideError() {
            error.style.display = 'none';
        }

        function hideResults() {
            results.style.display = 'none';
        }
    </script>
</body>
</html>
