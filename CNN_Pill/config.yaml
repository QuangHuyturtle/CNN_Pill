data:
  augmentation: true
  batch_size: 32
  num_workers: 4
model:
  dropout: 0.3
  freeze_backbone: true
  pretrained: true
  size: s
training:
  backbone_lr_multiplier: 0.1
  label_smoothing: 0.1
  learning_rate: 0.001
  num_epochs: 25
  optimizer: adamw
  scheduler: cosine
  unfreeze_epoch: 10
  use_class_weights: true
  warmup_epochs: 5
